<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코블버스 포켓몬 랜덤 파티 메이커</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/variables.css" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/components.css" />
</head>
<body>
  <!-- 로딩 오버레이 -->
  <div id="loading-overlay" class="loading-overlay" aria-live="polite" aria-label="데이터 로딩 중">
    <div class="loading-inner">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p id="loading-status" class="loading-status">포켓몬 데이터를 불러오는 중...</p>
      <div class="loading-bar-wrap">
        <div id="loading-bar" class="loading-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
    </div>
  </div>

  <!-- 앱 루트 -->
  <div id="app" class="app-root" hidden>

    <!-- 상단 바 -->
    <header class="top-bar" role="banner">
      <div class="top-bar__logo">
        <img class="top-bar__icon" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" alt="몬스터볼" aria-hidden="true" />
        <span class="top-bar__title">코블버스 포켓몬 랜덤 파티 메이커</span>
      </div>
    </header>

    <!-- 본문 -->
    <main class="app-body" role="main">

      <!-- 좌: 필터 사이드바 -->
      <aside id="filter-sidebar" class="filter-sidebar" aria-label="필터 설정">
        <!-- FilterPanel.js가 렌더링 -->
      </aside>

      <!-- 중: 파티 그리드 -->
      <section id="party-section" class="party-section" aria-label="파티 구성">
        <div id="party-grid" class="party-grid" role="list" aria-label="파티 슬롯">
          <!-- PartyGrid.js가 렌더링 -->
        </div>
      </section>

      <!-- 우1: 방어 매치업 -->
      <aside id="matchup-panel" class="matchup-panel" aria-label="방어 매치업">
        <!-- DefenseMatchup.js가 렌더링 -->
      </aside>

      <!-- 획득 정보는 파티 카드 내 인라인 표시로 전환 -->

    </main>
  </div>

  <!-- 검색 모달 -->
  <div id="search-modal" class="modal" role="dialog" aria-modal="true" aria-label="포켓몬 검색" hidden>
    <div class="modal__backdrop"></div>
    <div class="modal__panel">
      <!-- PinSearch.js가 렌더링 -->
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
